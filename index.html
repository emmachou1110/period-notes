<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Period Notes 🌙</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🌙 Period Notes</h1>
<p>A safe, anonymous wall to share your period stories.</p>

<div class="buttons">
  <button onclick="showWrite()">Leave a Note</button>
  <button onclick="loadNotes()">Read Notes</button>
  <button onclick="showSupport()">💛 I Need Support</button>
</div>

<div id="counter">🌙 0 stories shared</div>

<div id="writeSection" class="hidden">
  <textarea id="noteInput" placeholder="Share your experience..."></textarea>
  <br>
  <button onclick="postNote()">Post 💛</button>
</div>

<div id="wall"></div>

<script src="script.js"></script>
</body>
</html>
